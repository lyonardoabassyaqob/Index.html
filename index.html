<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقعي الأول</title>
    <style>
        /* تصميم الصفحة الأساسي */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f7f6;
            color: #333;
        }

        /* شريط التنقل */
        header {
            background-color: #2c3e50;
            color: white;
            padding: 20px;
            text-align: center;
        }

        nav a {
            color: #1abc9c;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            color: white;
        }

        /* المحتوى الرئيسي */
        .container {
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            text-align: center;
        }

        h1 {
            color: #2c3e50;
        }

        .btn {
            display: inline-block;
            background-color: #1abc9c;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            margin-top: 20px;
            transition: 0.3s;
        }

        .btn:hover {
            background-color: #16a085;
        }
    </style>
</head>
<body>

    <header>
        <h2>مرحباً بك في موقعي 🚀</h2>
        <nav>
            <a href="#">الرئيسية</a>
            <a href="#">المشاريع</a>
            <a href="#">اتصل بنا</a>
        </nav>
    </header>

    <div class="container">
        <h1>أهلاً بك في عالم تطوير الويب!</h1>
        <p>هذه هي البداية فقط. يمكنك تعديل هذا الكود وإضافة لمستك الخاصة لبناء مواقع رهيبة.</p>
        <a href="#" class="btn">اضغط هنا للمزيد</a>
    </div>

</body>
</html>
